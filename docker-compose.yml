

services:
  comfyui:
    build:
      context: .
      dockerfile: Dockerfile
    image: comfyui-p40m40:latest
    container_name: comfyui-p40m40

    # GPU passthrough (compose mode).
    gpus: all

    # Swarm-mode GPU reservation (ignored by regular docker compose).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ports:
      - "8188:8188"

    volumes:
      # Optional ComfyUI source bind mount.
      # If this host folder is empty, main_compat.py will bootstrap ComfyUI.
      - ./ComfyUI:/app/ComfyUI

      # Persist models across container rebuilds
      - ./models:/app/models
      - ${HOST_MODELS_PATH:-./ComfyUI/models}:/app/ComfyUI/models:rw

      # Outputs and inputs
      - ${HOST_OUTPUT_PATH:-./output}:/app/output:rw
      - ${HOST_INPUT_PATH:-./input}:/app/input:rw

      # Custom nodes persist
      - ${HOST_CUSTOM_NODES_PATH:-./ComfyUI/custom_nodes}:/app/ComfyUI/custom_nodes:rw

      # Live-reload compat layer during development
      - ./compat:/app/compat
      - ./comfy_aimdo:/app/comfy_aimdo
      - ./comfy_kitchen:/app/comfy_kitchen
      - ./patches:/app/patches
      - ./scripts:/app/scripts
      - ./main_compat.py:/app/main_compat.py

    environment:
      - PYTORCH_NO_CUDA_MEMORY_CACHING=0
      - COMFYUI_FORCE_FP16=1
      - TORCH_CUDA_ARCH_LIST=6.1;6.0;5.2
      - PYTHONUNBUFFERED=1
      - P40_FP8_POLICY=auto
      - P40_MAX_SAFETENSORS_GB=32

    command:
      - python
      - /app/main_compat.py
      - --listen
      - 0.0.0.0
      - --port
      - "8188"
      - --base-directory
      - /app/ComfyUI
      - --output-directory
      - /app/output
      - --input-directory
      - /app/input
      - --enable-manager
      - --gpu-only

    # Restart unless explicitly stopped
    restart: unless-stopped

    # Allow sufficient shared memory for large model loading
    shm_size: "4gb"

    # Increase ulimits for large models
    ulimits:
      memlock: -1
      stack: 67108864

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
